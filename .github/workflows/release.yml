name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write # OIDC token for keyless cosign signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for the changelog

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: false # no go.sum (zero dependencies), nothing to cache

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Build binaries
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 freebsd/amd64 freebsd/arm64 openbsd/amd64 netbsd/amd64 dragonfly/amd64 darwin/amd64 darwin/arm64 windows/amd64; do
            goos=${target%/*}
            goarch=${target#*/}
            ext=""
            if [ "$goos" = "windows" ]; then ext=".exe"; fi
            echo "building $goos/$goarch"
            GOOS=$goos GOARCH=$goarch CGO_ENABLED=0 \
              go build -trimpath \
              -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v}" \
              -o "dist/quickap-${goos}-${goarch}${ext}" .
          done
          ls -la dist/

      - name: Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign checksums (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature dist/checksums.txt.sig \
            --output-certificate dist/checksums.txt.pem \
            dist/checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Changelog: one bullet per commit since the previous tag; full
          # SHAs are auto-linked (and shortened) by GitHub.
          prev=$(git describe --tags --abbrev=0 "$GITHUB_REF_NAME^" 2>/dev/null || true)
          if [ -n "$prev" ]; then
            range="$prev..$GITHUB_REF_NAME"
          else
            range="$GITHUB_REF_NAME"
          fi
          {
            echo "## Changelog"
            echo
            git log --no-merges --format='* %H %s' "$range"
          } > notes.md
          gh release create "$GITHUB_REF_NAME" dist/* \
            --title "$GITHUB_REF_NAME" \
            --notes-file notes.md

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        if: github.ref != 'refs/heads/dev'
        run: go build -o quickap .
